name: Daily Investment Summary

on:
  schedule:
    # 21:30 UTC (日〜木) = 日本時間 平日 6:30
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r investment-summary/requirements.txt

      - name: Generate report
        working-directory: investment-summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m investment_summary.main --out reports

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add investment-summary/reports
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily investment summary $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          fi
